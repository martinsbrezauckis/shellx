# shellX release workflow
#
# Triggers: pushed tag matching `v*` (e.g. `v0.1.30`).
# Builds Windows installers and experimental Linux bundles, signs them
# with the Tauri updater private key, and uploads to GitHub Releases
# along with the updater manifest `latest.json`.
#
# The running app polls
# https://github.com/<owner>/<repo>/releases/latest/download/latest.json
# and surfaces an "Install & restart" banner when a new version lands.
#
# REQUIRED SECRETS (set in repo Settings → Secrets):
# TAURI_SIGNING_PRIVATE_KEY — contents of ~/.shellx-keys/updater.key
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD — empty string if key has no password
#
# To cut a release after explicit per-operation approval:
# git tag v0.1.x
# git push origin v0.1.x
# CI builds a draft GitHub Release for manual review.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          # macOS deferred until Developer ID signing/notarization is ready.
          # - platform: macos-latest
          #   args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        timeout-minutes: 15
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 update
          sudo apt-get -o Dpkg::Use-Pty=0 -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build + sign + bundle (tauri)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Auto-create or update a Draft release per tag, attach the
          # generated installers + the updater manifest. After CI
          # finishes, review the draft notes/artifacts before publishing
          # in the Releases UI. The auto-updater sees only published
          # releases.
          tagName: ${{ github.ref_name }}
          releaseName: "shellX ${{ github.ref_name }}"
          releaseBody: |
            See the changelog on GitHub for what's new.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --features debug-api
