# shellX CI — pre-merge checks
#
# Runs on every push + pull request against any branch. Gates:
# - Frontend type-check (tsc)
# - Frontend lint (TS scripts/test-*.ts unit checks)
# - Rust test suite (cargo test --all-targets --features debug-api)
# - Rust lints (cargo clippy -D warnings)
# - Rust formatting (cargo fmt --check)
# - Dependency audit (cargo audit)
#
# Failure on any step blocks merge. The release workflow stays in
# `.github/workflows/release.yml` and runs only on `v*` tags.

name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  frontend:
    name: Frontend (tsc + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: tsc --noEmit
        run: pnpm exec tsc --noEmit
      - name: test scripts
        run: pnpm test

  rust:
    name: Rust (test + clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux Tauri deps
        timeout-minutes: 15
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 update
          sudo apt-get -o Dpkg::Use-Pty=0 -o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install fake grok shim
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/fake-grok"
          cat > "$RUNNER_TEMP/fake-grok/grok" <<'EOF'
          #!/usr/bin/env bash
          if [[ "${1:-}" == "--version" ]]; then
            echo "grok fake-ci"
            exit 0
          fi
          echo "fake grok shim for CI" >&2
          exit 0
          EOF
          chmod +x "$RUNNER_TEMP/fake-grok/grok"
          echo "GROK_BIN=$RUNNER_TEMP/fake-grok/grok" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/fake-grok" >> "$GITHUB_PATH"
      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check
      - name: cargo clippy -D warnings
        working-directory: src-tauri
        run: cargo clippy --all-targets --features debug-api -- -D warnings
      - name: cargo test --all-targets --features debug-api
        working-directory: src-tauri
        run: cargo test --all-targets --features debug-api

  rust-cross-platform:
    name: Rust check (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check --all-targets --features debug-api
        working-directory: src-tauri
        run: cargo check --all-targets --features debug-api

  audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1
      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit
